<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Assi</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            font-family: 'Segoe UI', sans-serif;
            color: #e6edf3;
        }

        .card {
            text-align: center;
            padding: 48px 64px;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 8px;
            letter-spacing: 1px;
        }

        .tag {
            display: inline-block;
            font-size: 0.85rem;
            color: #58a6ff;
            border: 1px solid #58a6ff44;
            border-radius: 20px;
            padding: 4px 14px;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Karim Assi</h1>
        <div class="tag">Github Exercise</div>
    </div>
</body>
</html>
