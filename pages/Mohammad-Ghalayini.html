<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example Intern Page</title>
  <style>
    body {
      margin: 0;
      color: #181612;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(100% - 32px, 680px);
      margin: 0 auto;
      padding: 64px 0;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2.5rem;
      line-height: 1;
    }
    p {
      margin: 0;
      color: #65615a;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Mohammad Ghalayini</h1>
    <p>
  I practiced creating a branch, committing a page, pushing it to GitHub,
  opening a pull request, and displaying the current time using Javascript.
   </p>

   <br>

    <p>
      Current time:
      <span id="time"></span>
    </p>

    <script>
    document.getElementById("time").textContent = new Date();
    </script>

  </main>
</body>
</html>
